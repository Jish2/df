# herdr configuration
# Docs: https://herdr.dev/docs/configuration/

onboarding = false

[terminal]
default_shell = "zsh"
shell_mode = "auto"   # login shells on macOS so Homebrew/PATH init runs in new panes
new_cwd = "follow"  # inherit cwd from source pane/workspace

[worktrees]
directory = "~/github/herdr-worktrees"

[theme]
name = "catppuccin"
auto_switch = true
light_name = "catppuccin-latte"
dark_name = "catppuccin"

[keys]
prefix = "ctrl+a"
last_pane = "prefix+semicolon"
focus_pane_left = ["prefix+h", "ctrl+h"]
focus_pane_down = ["prefix+j", "ctrl+j"]
focus_pane_up = ["prefix+k", "ctrl+k"]
focus_pane_right = ["prefix+l", "ctrl+l"]
# Also accept ctrl+n/p after prefix so holding Control still cycles tabs.
previous_tab = ["prefix+p", "prefix+ctrl+p"]
next_tab = ["prefix+n", "prefix+ctrl+n"]
navigate_workspace_up = ["up", "k"]
navigate_workspace_down = ["down", "j"]
# Jump to agent 1–9 in the Agents panel order (topmost = 1).
# Use ctrl (not alt): macOS Option+1 types ¡ and never reaches Herdr.
focus_agent = "prefix+ctrl+1..9"

[[keys.command]]
key = "prefix+alt+g"
type = "pane"
command = "lazygit"
description = "lazygit"

[[keys.command]]
key = "prefix+shift+c"
type = "shell"
command = '''
set -eu
worktree="$(treehouse get --lease --lease-holder herdr)"
created="$("$HERDR_BIN_PATH" tab create --workspace "$HERDR_ACTIVE_WORKSPACE_ID" --cwd "$worktree" --focus)"
pane_id="$(printf '%s\n' "$created" | python3 -c 'import json, sys; print(json.load(sys.stdin)["result"]["root_pane"]["pane_id"])')"
"$HERDR_BIN_PATH" pane run "$pane_id" "exec agent"
'''
description = "new feature agent"

[ui]
mouse_scroll_lines = 2
# Attention queue: blocked → done → working → idle (done near the top).
agent_panel_sort = "priority"
# tmux-style shared dividers (default true leaves a gap between pane borders)
pane_gaps = false
navigator_start_in_search = true

[ui.toast]
delivery = "system"
delay_seconds = 1

[ui.sidebar.spaces]
row_gap = 1

[ui.sidebar.agents]
row_gap = 1
rows = [
  ["state_icon", "workspace", "tab"],
  ["agent"],
]

[ui.sidebar.agents.rows_by_agent]
claude = [
  ["state_icon", "agent", "state_text"],
  ["terminal_title_stripped"],
  ["workspace", "tab"],
]
codex = [
  ["state_icon", "agent", "state_text"],
  ["terminal_title_stripped"],
  ["workspace", "tab"],
]
cursor = [
  ["state_icon", "agent", "state_text"],
  ["terminal_title_stripped"],
  ["workspace", "tab"],
]

[session]
resume_agents_on_restore = true

[advanced]
scrollback_limit_bytes = 100000000

[experimental]
pane_history = true
