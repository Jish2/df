# herdr configuration
# Docs: https://herdr.dev/docs/configuration/

onboarding = false

[terminal]
default_shell = "zsh"
shell_mode = "auto"   # login shells on macOS so Homebrew/PATH init runs in new panes
new_cwd = "follow"  # inherit cwd from source pane/workspace

[worktrees]
directory = "~/github/herdr-worktrees"

[theme]
name = "catppuccin"
auto_switch = true
light_name = "catppuccin-latte"
dark_name = "catppuccin"

[keys]
prefix = "ctrl+a"
focus_pane_left = ["prefix+h", "ctrl+h"]
focus_pane_down = ["prefix+j", "ctrl+j"]
focus_pane_up = ["prefix+k", "ctrl+k"]
focus_pane_right = ["prefix+l", "ctrl+l"]

[[keys.command]]
key = "prefix+alt+g"
type = "pane"
command = "lazygit"
description = "lazygit"

[ui]
mouse_scroll_lines = 1

[ui.toast]
delivery = "system"
delay_seconds = 1

[ui.sidebar.agents]
row_gap = 1
rows = [
  ["state_icon", "workspace", "tab"],
  ["agent"],
]

[ui.sidebar.agents.rows_by_agent]
claude = [
  ["state_icon", "agent", "state_text"],
  ["terminal_title_stripped"],
  ["workspace", "tab"],
]
codex = [
  ["state_icon", "agent", "state_text"],
  ["terminal_title_stripped"],
  ["workspace", "tab"],
]
cursor = [
  ["state_icon", "agent", "state_text"],
  ["terminal_title_stripped"],
  ["workspace", "tab"],
]

[session]
resume_agents_on_restore = true

[advanced]
scrollback_limit_bytes = 100000000

[experimental]
pane_history = true
